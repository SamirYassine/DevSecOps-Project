version: '3.8'

services:
  backend:
    build:
      context: ./quess_back
      dockerfile: Dockerfile
    container_name: quess_backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
    volumes:
      - ./quess_back:/var/www/symfony
    depends_on:
      - database
    networks:
      - quess_network

  frontend:
    build:
      context: ./quess_front
      dockerfile: Dockerfile
    container_name: quess_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - quess_network

  database:
    image: mysql:8.0
    container_name: quess_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-quess}
      MYSQL_USER: ${MYSQL_USER:-quess_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - quess_network

  nginx:
    image: nginx:alpine
    container_name: quess_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./quess_back/public:/var/www/symfony/public
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - quess_network

networks:
  quess_network:
    driver: bridge

volumes:
  db_data:
