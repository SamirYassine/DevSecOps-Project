name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # STAGE 1: Secrets Scanning
  # ─────────────────────────────────────────
  secrets-scan:
    name: Secrets Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LOG_OPTS: "--all"

  # ─────────────────────────────────────────
  # STAGE 2: PHP Security (Backend)
  # ─────────────────────────────────────────
  php-security:
    name: PHP Security (Symfony)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quess_back

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Create .env from .env.ci
        run: cp .env.ci .env

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Composer Audit (SCA - vulnerable packages)
        run: composer audit --abandoned=ignore
        continue-on-error: false

      - name: PHP Static Analysis - Psalm (SAST)
        run: |
          composer require --dev vimeo/psalm --no-progress
          vendor/bin/psalm --no-progress --output-format=github || true

  # ─────────────────────────────────────────
  # STAGE 3: JS Security (Frontend)
  # ─────────────────────────────────────────
  js-security:
    name: JS Security (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quess_front

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: quess_front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: NPM Audit (SCA - vulnerable packages)
        run: npm audit --audit-level=critical
        continue-on-error: false

      - name: ESLint Security (SAST)
        run: |
          npm install --save-dev eslint eslint-plugin-security
          npx eslint src/ --plugin security --rule 'security/detect-object-injection: warn' || true

  # -----------------------------------------
  # STAGE 4: Container Security
  # -----------------------------------------
  container-security:
    name: Container Scanning (Trivy)
    runs-on: ubuntu-latest
    needs: [php-security, js-security]

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t quess-backend:${{ github.sha }} ./quess_back

      - name: Build Frontend Image
        run: docker build -t quess-frontend:${{ github.sha }} ./quess_front

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: quess-backend:${{ github.sha }}
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: quess-frontend:${{ github.sha }}
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

  # -----------------------------------------
  # STAGE 5: Build and Push to GHCR
  # -----------------------------------------
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [secrets-scan, container-security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_repo: ${{ steps.meta.outputs.repo }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "repo=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./quess_back
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}/quess-backend:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.repo }}/quess-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./quess_front
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}/quess-frontend:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.repo }}/quess-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # -----------------------------------------
  # STAGE 6: Deploy to K3s
  # -----------------------------------------
  deploy:
    name: Deploy to K3s (VPS)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Upload infra manifests to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "infra/k8s/namespace.yml,infra/k8s/configmap.yml,infra/k8s/mysql-statefulset.yml,infra/k8s/backend-deployment.yml,infra/k8s/nginx-deployment.yml,infra/k8s/frontend-deployment.yml,infra/k8s/ingress.yml,infra/k8s/network-policy.yml,infra/monitoring/helm-values.yml"
          target: "/tmp/quess-deploy"

      - name: Deploy backend and frontend with kubectl set image
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_REPO: ${{ needs.build-and-push.outputs.image_repo }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          envs: IMAGE_REPO,IMAGE_TAG
          script: |
            set -euo pipefail

            DEPLOY_DIR="/tmp/quess-deploy/infra"
            BACKEND_IMAGE="ghcr.io/${IMAGE_REPO}/quess-backend:${IMAGE_TAG}"
            FRONTEND_IMAGE="ghcr.io/${IMAGE_REPO}/quess-frontend:${IMAGE_TAG}"

            # Apply Kubernetes manifests (excluding secrets template by design).
            kubectl apply -f "${DEPLOY_DIR}/k8s/namespace.yml"
            kubectl apply -f "${DEPLOY_DIR}/k8s/configmap.yml"
            kubectl apply -f "${DEPLOY_DIR}/k8s/mysql-statefulset.yml"
            kubectl apply -f "${DEPLOY_DIR}/k8s/backend-deployment.yml"
            kubectl apply -f "${DEPLOY_DIR}/k8s/nginx-deployment.yml"
            kubectl apply -f "${DEPLOY_DIR}/k8s/frontend-deployment.yml"
            kubectl apply -f "${DEPLOY_DIR}/k8s/ingress.yml"
            kubectl apply -f "${DEPLOY_DIR}/k8s/network-policy.yml"

            # Keep monitoring release aligned with repo values.
            helm repo add prometheus-community https://prometheus-community.github.io/helm-charts || true
            helm repo update
            helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
              --namespace monitoring --create-namespace \
              -f "${DEPLOY_DIR}/monitoring/helm-values.yml"

            kubectl -n quess set image deployment/quess-backend backend="${BACKEND_IMAGE}"
            kubectl -n quess set image deployment/quess-frontend frontend="${FRONTEND_IMAGE}"

            kubectl -n quess rollout status deployment/quess-backend --timeout=180s
            kubectl -n quess rollout status deployment/quess-frontend --timeout=180s

            kubectl -n quess get pods -o wide

  # -----------------------------------------
  # STAGE 7: Summary
  # -----------------------------------------
  security-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs:
      [
        secrets-scan,
        php-security,
        js-security,
        container-security,
        build-and-push,
        deploy,
      ]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "## DevSecOps Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Scanning | ${{ needs.secrets-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHP Security | ${{ needs.php-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JS Security | ${{ needs.js-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Scanning | ${{ needs.container-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push GHCR | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy to K3s | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
