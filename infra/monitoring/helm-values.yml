# kube-prometheus-stack Helm values for QUESS on K3s (arm64)
# Deployed in the 'monitoring' namespace
#
# Deploy command:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     -f infra/monitoring/helm-values.yml

prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

grafana:
  adminPassword: "QuessGrafana2026!"
  persistence:
    enabled: true
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
    hosts:
      - grafana.141.147.6.140.nip.io
    path: /
    pathType: Prefix

alertmanager:
  enabled: false

prometheus-node-exporter:
  # Traefik on this VPS already binds host port 9100.
  # Keep node-exporter on 9101 to avoid DaemonSet scheduling conflicts.
  service:
    port: 9101
    targetPort: 9101
  tolerations:
    - operator: Exists
      effect: NoSchedule
    - operator: Exists
      effect: NoExecute
  hostRootFsMount:
    enabled: false
    mountPropagation: HostToContainer


# K3s does not expose control-plane metrics endpoints -- disable to avoid scrape errors
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false

defaultRules:
  rules:
    etcd: false
    kubeScheduler: false
