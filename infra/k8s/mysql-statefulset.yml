apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: quess-mysql
  namespace: quess
spec:
  serviceName: quess-mysql
  replicas: 1
  selector:
    matchLabels:
      app: quess-mysql
  template:
    metadata:
      labels:
        app: quess-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quess-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: quess-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: quess-config
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quess-secrets
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: quess-mysql
  namespace: quess
spec:
  selector:
    app: quess-mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None
