# TEMPLATE ONLY - Do not commit real values.
# Replace all CHANGE_ME placeholders before applying:
#   kubectl apply -f secrets.yml -n quess
#
# To base64-encode a value:
#   echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: quess-secrets
  namespace: quess
type: Opaque
data:
  # echo -n 'your-app-secret' | base64
  APP_SECRET: CHANGE_ME

  # echo -n 'mysql://quess_user:yourpassword@quess-mysql:3306/quess' | base64
  DATABASE_URL: CHANGE_ME

  # echo -n 'yourpassword' | base64
  MYSQL_ROOT_PASSWORD: CHANGE_ME
  MYSQL_PASSWORD: CHANGE_ME

  # echo -n 'your-jwt-passphrase' | base64
  JWT_PASSPHRASE: CHANGE_ME

  # Base64-encode the full content of your private.pem and public.pem files:
  #   base64 -w 0 config/jwt/private.pem
  JWT_PRIVATE_KEY: CHANGE_ME
  JWT_PUBLIC_KEY: CHANGE_ME
