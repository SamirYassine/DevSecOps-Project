apiVersion: apps/v1
kind: Deployment
metadata:
  name: quess-frontend
  namespace: quess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quess-frontend
  template:
    metadata:
      labels:
        app: quess-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/samiryassine/devsecops-project/quess-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: quess-frontend
  namespace: quess
spec:
  selector:
    app: quess-frontend
  ports:
    - port: 80
      targetPort: 80
