---
# Role: k3s
# Installs K3s (lightweight Kubernetes) in single-node mode.

- name: Check if K3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install K3s
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - \
      --write-kubeconfig-mode 644 \
      --tls-san {{ ansible_host }} \
      --advertise-address={{ k3s_node_private_ip | default(ansible_default_ipv4.address) }} \
      --disable=servicelb \
      --node-external-ip={{ ansible_host }} \
      --node-ip={{ k3s_node_private_ip | default(ansible_default_ipv4.address) }}
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists

- name: Wait for K3s to be ready
  ansible.builtin.command: k3s kubectl get nodes
  register: k3s_nodes
  retries: 10
  delay: 10
  until: k3s_nodes.rc == 0
  changed_when: false

- name: Create .kube directory for ubuntu user
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy kubeconfig for ubuntu user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0600"

- name: Update kubeconfig server address to private IP
  # OCI uses 1:1 NAT — the VPS cannot hairpin-connect to its own public IP.
  # Use the private IP for local kubectl/helm commands on the node itself.
  ansible.builtin.replace:
    path: /home/ubuntu/.kube/config
    regexp: "https://127.0.0.1:6443"
    replace: "https://{{ k3s_node_private_ip | default(ansible_default_ipv4.address) }}:6443"

- name: Create kubectl symlink
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
  ignore_errors: true

- name: Verify K3s node status
  ansible.builtin.command: kubectl get nodes -o wide
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: nodes_status
  changed_when: false

- name: Display K3s nodes
  ansible.builtin.debug:
    var: nodes_status.stdout_lines

# ── Traefik configuration ────────────────────────────────────────────────────
# Drop a HelmChartConfig into K3s's auto-manifest directory. K3s's Helm
# controller watches this directory and reconciles Traefik automatically —
# no manual helm/kubectl steps needed after provisioning.
- name: Copy Traefik HelmChartConfig to K3s auto-manifest directory
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../k8s/traefik-config.yml"
    dest: /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
    owner: root
    group: root
    mode: "0644"

- name: Wait for Traefik to reconcile after HelmChartConfig update
  ansible.builtin.command: >
    k3s kubectl rollout status deployment/traefik
    -n kube-system --timeout=120s
  register: traefik_rollout
  changed_when: false
  ignore_errors: true   # First run: deployment may not exist yet; that's OK.

- name: Verify Traefik is listening on port 80
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: 80
    timeout: 60
  ignore_errors: true   # Non-fatal — print status in next task instead.
