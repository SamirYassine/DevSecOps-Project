---
# Role: common
# Updates packages and installs essential system tools.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: safe

- name: Install essential packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - htop
      - vim
      - unzip
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - software-properties-common
      - python3-pip
    state: present

- name: Set timezone to Europe/Paris
  community.general.timezone:
    name: Europe/Paris

- name: Enable automatic security updates
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present

- name: Ensure NTP is running
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: started
    enabled: true

# Oracle Cloud's public IP is NAT'd onto the private interface.
# Traefik runs as non-root, so it cannot bind to ports < 1024 by default
# even with CAP_NET_BIND_SERVICE when K3s Helm chart overrides securityContext.
# Setting ip_unprivileged_port_start=80 lets any user-space process bind to
# port 80/443 without any capability — cleanest fix, no iptables tricks needed.
- name: Allow non-root processes to bind to ports >= 80 (needed for Traefik on OCI)
  ansible.posix.sysctl:
    name: net.ipv4.ip_unprivileged_port_start
    value: "80"
    sysctl_set: true
    state: present
    reload: true
