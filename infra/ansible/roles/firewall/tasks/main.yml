---
# Role: firewall
# Configures UFW to allow only necessary ports.

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Reset UFW to defaults
  community.general.ufw:
    state: reset

- name: Set default incoming policy to deny
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set default outgoing policy to allow
  community.general.ufw:
    direction: outgoing
    default: allow

# K3s flannel/CNI requires forwarding between pod CIDRs.
# UFW defaults FORWARD to DROP which silently breaks pod-to-pod traffic.
- name: Set default forward policy to allow (required by K3s CNI / flannel)
  community.general.ufw:
    direction: routed
    default: allow

- name: Allow required ports
  community.general.ufw:
    rule: allow
    port: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
  loop: "{{ allowed_ports }}"

- name: Allow K3s internal traffic (flannel VXLAN)
  community.general.ufw:
    rule: allow
    port: "8472"
    proto: udp

- name: Allow K3s kubelet metrics
  community.general.ufw:
    rule: allow
    port: "10250"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Verify UFW status
  ansible.builtin.command: ufw status verbose
  register: ufw_status
  changed_when: false

- name: Display UFW status
  ansible.builtin.debug:
    var: ufw_status.stdout_lines
